name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test (windows-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore InputLanguagePopup.sln

      - name: Build
        run: dotnet build InputLanguagePopup.sln -c Release --no-restore

      - name: Test
        run: dotnet test InputLanguagePopup.sln -c Release --no-build --verbosity normal
