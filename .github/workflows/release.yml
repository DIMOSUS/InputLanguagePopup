name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Publish & release (windows-x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test InputLanguagePopup.sln -c Release

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing version $version"

      - name: Publish single-file self-contained x64
        run: ./publish.ps1 -Version ${{ steps.ver.outputs.version }}
        shell: pwsh

      - name: Name the release asset
        id: asset
        shell: pwsh
        run: |
          $name = "InputLanguagePopup-${{ github.ref_name }}-win-x64.exe"
          Copy-Item publish/InputLanguagePopup.exe $name
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
