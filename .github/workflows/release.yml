name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release and upload assets

jobs:
  release:
    name: Publish & release (windows-x64)
    runs-on: windows-latest

    # Pass the tag through the environment (never interpolate ${{ github.* }}
    # directly into a run script) and validate it before use.
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test InputLanguagePopup.sln -c Release

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = $env:TAG_NAME
          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Invalid release tag: $tag"
          }
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Publishing version $version"

      - name: Publish Native AOT x64
        run: ./publish.ps1 -Version ${{ steps.ver.outputs.version }}
        shell: pwsh

      - name: Verify the published binary (self-test)
        shell: pwsh
        run: |
          & ./publish/InputLanguagePopup.exe --selftest
          Start-Sleep -Seconds 3
          $log = Join-Path $env:LOCALAPPDATA 'InputLanguagePopup\selftest.log'
          if (-not (Test-Path $log)) { throw 'Self-test produced no log.' }
          Get-Content $log
          if (-not (Select-String -Path $log -Pattern 'SELFTEST PASSED' -Quiet)) {
            throw 'Self-test did not pass.'
          }

      - name: Name the release asset
        id: asset
        shell: pwsh
        run: |
          $name = "InputLanguagePopup-$($env:TAG_NAME)-win-x64.exe"
          Copy-Item publish/InputLanguagePopup.exe $name
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.asset.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
